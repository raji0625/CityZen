<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anomaly Checker — CityZen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --surface2: #191d26;
    --border: #232732;
    --text: #e8eaf0;
    --muted: #505670;
    --accent: #22d3c8;
    --green: #22d3c8;
    --green-bg: #0d2422;
    --red: #f05252;
    --red-bg: #200f0f;
    --yellow: #f0a030;
    --yellow-bg: #1e1508;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #232732 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }

  body > * { position: relative; z-index: 1; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  nav {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .back-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.12s;
  }
  .back-btn:hover { color: var(--text); }

  .nav-sep { color: var(--border); }

  .nav-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  .page-header {
    margin-bottom: 28px;
  }

  .page-header h1 {
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .page-header p {
    font-size: 14px;
    color: var(--muted);
  }

  /* ASSET TYPE SELECTOR */
  .type-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .type-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .type-btn:hover { border-color: var(--accent); color: var(--text); }
  .type-btn.active { background: var(--accent); color: #0d0f14; border-color: var(--accent); }

  .type-icon { font-size: 14px; }

  /* FORM LAYOUT */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .card-header {
    padding: 13px 18px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
  }

  .card-body { padding: 18px; }

  .field-group {
    margin-bottom: 14px;
  }

  .field-group:last-child { margin-bottom: 0; }

  .field-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .field-label label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .threshold-hint {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.7;
  }

  .field-input {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    outline: none;
    transition: border-color 0.12s;
  }

  .field-input:focus { border-color: var(--accent); background: var(--surface2); }

  .field-input.warn { border-color: var(--yellow); background: var(--yellow-bg); }
  .field-input.crit { border-color: var(--red); background: var(--red-bg); }
  .field-input.ok   { border-color: var(--accent); }

  select.field-input {
    cursor: pointer;
  }

  /* LOCATION FIELDS */
  .loc-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* ANALYZE BUTTON */
  .analyze-btn {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 14px;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .analyze-btn:hover { opacity: 0.88; }
  .analyze-btn:active { transform: scale(0.99); }

  /* RESULT SECTION */
  .result-section {
    display: none;
    animation: fadeUp 0.25s ease;
  }

  .result-section.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 24px;
    border-radius: 10px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .result-icon {
    font-size: 32px;
    line-height: 1;
  }

  .result-status {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }

  .result-reason {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.5;
  }

  .result-header.status-healthy { border-color: var(--accent); background: rgba(34,211,200,0.06); }
  .result-header.status-warning { border-color: var(--yellow); background: var(--yellow-bg); }
  .result-header.status-critical { border-color: var(--red); background: var(--red-bg); }

  .result-header.status-healthy .result-status { color: var(--accent); }
  .result-header.status-warning .result-status  { color: var(--yellow); }
  .result-header.status-critical .result-status { color: var(--red); }

  /* RESULT GRID */
  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  #result-map { height: 240px; width: 100%; }

  .chart-wrap {
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 240px;
  }

  .readings-list { padding: 0; }

  .reading-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .reading-row:last-child { border-bottom: none; }

  .r-key {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .r-val {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }

  .r-ok   { color: var(--accent); }
  .r-warn { color: var(--yellow); }
  .r-crit { color: var(--red); }

  /* SAVE BUTTON (admin only) */
  .save-row {
    display: none;
    margin-top: 16px;
  }

  .save-row.visible { display: block; }

  .save-btn {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .save-btn:hover { background: var(--surface2); border-color: var(--accent); }

  .save-confirm {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    padding: 12px;
    display: none;
  }

  /* No asset type selected state */
  .no-type {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    display: none;
  }

  .no-type.visible { display: block; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="back-btn">← Back</a>
  <span class="nav-sep">·</span>
  <span class="nav-title">Anomaly Checker</span>
</nav>

<div class="page">

  <div class="page-header">
    <h1>Live Anomaly Checker</h1>
    <p>Enter sensor values for any asset — get instant health classification with anomaly detection.</p>
  </div>

  <!-- ASSET TYPE -->
  <div class="type-selector">
    <button class="type-btn" onclick="selectType('bridge', this)">
      <span class="type-icon">🌉</span> Bridge
    </button>
    <button class="type-btn" onclick="selectType('building', this)">
      <span class="type-icon">🏢</span> Building
    </button>
    <button class="type-btn" onclick="selectType('streetlight', this)">
      <span class="type-icon">💡</span> Streetlight
    </button>
    <button class="type-btn" onclick="selectType('pipeline', this)">
      <span class="type-icon">🔧</span> Pipeline
    </button>
    <button class="type-btn" onclick="selectType('road', this)">
      <span class="type-icon">🛣</span> Road
    </button>
  </div>

  <!-- PLACEHOLDER -->
  <div class="no-type visible" id="no-type">
    ↑ Select an asset type to begin
  </div>

  <!-- INPUT FORM -->
  <div id="input-form" style="display:none;">
    <div class="form-grid">
      <!-- Sensor inputs -->
      <div class="card">
        <div class="card-header">Sensor Readings</div>
        <div class="card-body" id="sensor-fields"></div>
      </div>

      <!-- Location + name -->
      <div class="card">
        <div class="card-header">Asset Details</div>
        <div class="card-body">
          <div class="field-group">
            <div class="field-label">
              <label>Asset Name</label>
            </div>
            <input type="text" class="field-input" id="f-name" placeholder="e.g. Adyar Bridge" />
          </div>
          <div class="field-group">
            <div class="field-label">
              <label>Area / Zone</label>
            </div>
            <input type="text" class="field-input" id="f-area" placeholder="e.g. Adyar, Chennai" />
          </div>
          <div class="field-group">
            <div class="field-label">
              <label>Coordinates</label>
            </div>
            <div class="loc-row">
              <input type="number" class="field-input" id="f-lat" placeholder="Latitude" step="0.0001" />
              <input type="number" class="field-input" id="f-lng" placeholder="Longitude" step="0.0001" />
            </div>
          </div>
          <div class="field-group" style="margin-top:6px;">
            <div class="field-label">
              <label>Quick location presets</label>
            </div>
            <select class="field-input" onchange="applyPreset(this.value)">
              <option value="">— Select a Chennai area —</option>
              <option value="13.0067,80.2206">Adyar</option>
              <option value="13.0418,80.2341">T Nagar</option>
              <option value="13.0827,80.2101">Anna Nagar</option>
              <option value="13.0543,80.2627">Royapettah</option>
              <option value="12.9815,80.2209">Velachery</option>
              <option value="12.9010,80.2279">Sholinganallur / OMR</option>
              <option value="13.1167,80.2333">Perambur</option>
              <option value="12.9229,80.1275">Tambaram</option>
              <option value="13.0732,80.2609">Egmore</option>
              <option value="13.0389,80.1567">Porur</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <button class="analyze-btn" onclick="analyze()">
      ⚡ Analyze Now
    </button>
  </div>

  <!-- RESULT -->
  <div class="result-section" id="result-section">

    <div class="result-header" id="result-header">
      <div class="result-icon" id="result-icon">—</div>
      <div>
        <div class="result-status" id="result-status">—</div>
        <div class="result-reason" id="result-reason">—</div>
      </div>
    </div>

    <div class="result-grid">
      <div class="card">
        <div class="card-header">Location</div>
        <div id="result-map"></div>
      </div>
      <div class="card">
        <div class="card-header">Sensor Health</div>
        <div class="chart-wrap">
          <canvas id="result-chart"></canvas>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:0;">
      <div class="card-header">Reading Breakdown</div>
      <div class="readings-list" id="result-readings"></div>
    </div>

    <div class="save-row" id="save-row">
      <button class="save-btn" onclick="saveAsset()">＋ Save as new asset to dashboard</button>
      <div class="save-confirm" id="save-confirm">✓ Asset saved — refresh the dashboard to see it</div>
    </div>

  </div>

</div>

<script>
  const API = '/api';
  const role = sessionStorage.getItem('role') || 'public';
  let currentType = null;
  let resultMap = null;
  let resultChart = null;

  // Field definitions per asset type
  const FIELDS = {
    bridge: [
      { id: 'vibration',   label: 'Vibration',   unit: 'm/s²',  hint: 'warn >5 · crit >8',  warn: 5,  crit: 8  },
      { id: 'crack_index', label: 'Crack Index',  unit: '',      hint: 'warn >4 · crit >7',  warn: 4,  crit: 7  },
      { id: 'load_tons',   label: 'Load',         unit: 'tons',  hint: 'normal <100' },
      { id: 'temperature', label: 'Temperature',  unit: '°C',    hint: '' },
      { id: 'wind_speed',  label: 'Wind Speed',   unit: 'm/s',   hint: '' },
    ],
    building: [
      { id: 'crack_index', label: 'Crack Index',  unit: '',      hint: 'warn >4 · crit >7',  warn: 4,  crit: 7  },
      { id: 'tilt_angle',  label: 'Tilt Angle',   unit: '°',     hint: 'warn >1 · crit >2',  warn: 1,  crit: 2  },
      { id: 'co2',         label: 'CO₂',          unit: 'ppm',   hint: 'warn >700',           warn: 700 },
      { id: 'humidity',    label: 'Humidity',     unit: '%',     hint: '' },
      { id: 'temperature', label: 'Temperature',  unit: '°C',    hint: '' },
    ],
    streetlight: [
      { id: 'flicker_count',  label: 'Flicker Count',  unit: '',     hint: 'warn ≥3 · crit ≥5',  warn: 3,  crit: 5  },
      { id: 'hours_offline',  label: 'Hours Offline',  unit: 'hrs',  hint: 'warn >24 · crit >48', warn: 24, crit: 48 },
      { id: 'temperature',    label: 'Temperature',    unit: '°C',   hint: '' },
    ],
    pipeline: [
      { id: 'pressure',   label: 'Pressure',    unit: '',      hint: 'warn >75 · crit >85', warn: 75, crit: 85 },
      { id: 'vibration',  label: 'Vibration',   unit: '',      hint: 'warn >3.5 · crit >4', warn: 3.5, crit: 4 },
      { id: 'flow_rate',  label: 'Flow Rate',   unit: '',      hint: '' },
      { id: 'leakage',    label: 'Leakage',     unit: '',      hint: 'Yes = Critical',       type: 'select', options: ['No', 'Yes'] },
    ],
    road: [
      { id: 'defect_count',    label: 'Defect Count',     unit: '',   hint: 'warn ≥2 · crit ≥4',  warn: 2, crit: 4 },
      { id: 'avg_confidence',  label: 'Avg Confidence',   unit: '',   hint: '0.0 – 1.0' },
      { id: 'condition',       label: 'Condition',        unit: '',   hint: '',                    type: 'select', options: ['Good', 'Moderate', 'Bad'] },
    ],
  };

  function selectType(type, btn) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('no-type').classList.remove('visible');
    document.getElementById('input-form').style.display = 'block';
    document.getElementById('result-section').classList.remove('visible');
    buildFields(type);
  }

  function buildFields(type) {
    const container = document.getElementById('sensor-fields');
    container.innerHTML = '';
    FIELDS[type].forEach(f => {
      const isSelect = f.type === 'select';
      let inputHtml;
      if (isSelect) {
        inputHtml = `<select class="field-input" id="f-${f.id}">
          ${f.options.map(o => `<option value="${o}">${o}</option>`).join('')}
        </select>`;
      } else {
        inputHtml = `<input type="number" class="field-input" id="f-${f.id}" placeholder="Enter value" step="0.01" oninput="colorField('${f.id}', ${f.warn||'null'}, ${f.crit||'null'})" />`;
      }
      container.innerHTML += `
        <div class="field-group">
          <div class="field-label">
            <label>${f.label}${f.unit ? ` (${f.unit})` : ''}</label>
            <span class="threshold-hint">${f.hint}</span>
          </div>
          ${inputHtml}
        </div>`;
    });
  }

  function colorField(id, warn, crit) {
    const el = document.getElementById(`f-${id}`);
    const v = parseFloat(el.value);
    if (isNaN(v)) { el.className = 'field-input'; return; }
    if (crit !== null && v >= crit) el.className = 'field-input crit';
    else if (warn !== null && v >= warn) el.className = 'field-input warn';
    else el.className = 'field-input ok';
  }

  function applyPreset(val) {
    if (!val) return;
    const [lat, lng] = val.split(',');
    document.getElementById('f-lat').value = lat;
    document.getElementById('f-lng').value = lng;
  }

  // CLASSIFICATION LOGIC
  function classify(type, values) {
    const reasons = [];
    let status = 'Healthy';

    const flag = (cond, msg, level) => {
      if (cond) { reasons.push(msg); if (level === 'critical') status = 'Critical'; else if (level === 'warning' && status !== 'Critical') status = 'Warning'; }
    };

    if (type === 'bridge') {
      const v = parseFloat(values.vibration) || 0;
      const c = parseFloat(values.crack_index) || 0;
      flag(v > 8,  `Vibration ${v} m/s² exceeds critical limit of 8.0`, 'critical');
      flag(c > 7,  `Crack index ${c} exceeds critical limit of 7.0`, 'critical');
      flag(v > 5 && v <= 8, `Vibration ${v} m/s² exceeds warning limit of 5.0`, 'warning');
      flag(c > 4 && c <= 7, `Crack index ${c} exceeds warning limit of 4.0`, 'warning');
    }

    if (type === 'building') {
      const c = parseFloat(values.crack_index) || 0;
      const t = parseFloat(values.tilt_angle) || 0;
      const co2 = parseFloat(values.co2) || 0;
      flag(c > 7,  `Crack index ${c} exceeds critical limit of 7.0`, 'critical');
      flag(t > 2,  `Tilt angle ${t}° exceeds critical limit of 2.0°`, 'critical');
      flag(c > 4 && c <= 7, `Crack index ${c} exceeds warning limit of 4.0`, 'warning');
      flag(t > 1 && t <= 2, `Tilt angle ${t}° exceeds warning limit of 1.0°`, 'warning');
      flag(co2 > 700, `CO₂ ${co2} ppm exceeds warning limit of 700 ppm`, 'warning');
    }

    if (type === 'streetlight') {
      const fl = parseFloat(values.flicker_count) || 0;
      const off = parseFloat(values.hours_offline) || 0;
      flag(off > 48, `Offline for ${off} hrs — critical limit 48 hrs`, 'critical');
      flag(fl >= 5,  `Flicker count ${fl} — critical limit is 5`, 'critical');
      flag(off > 24 && off <= 48, `Offline for ${off} hrs — warning limit 24 hrs`, 'warning');
      flag(fl >= 3 && fl < 5, `Flicker count ${fl} — warning limit is 3`, 'warning');
    }

    if (type === 'pipeline') {
      const p = parseFloat(values.pressure) || 0;
      const v = parseFloat(values.vibration) || 0;
      const leak = values.leakage === 'Yes';
      flag(leak, `Leakage detected — immediate critical risk`, 'critical');
      flag(p > 85, `Pressure ${p} exceeds critical limit of 85`, 'critical');
      flag(v > 4,  `Vibration ${v} exceeds critical limit of 4.0`, 'critical');
      flag(p > 75 && p <= 85, `Pressure ${p} exceeds warning limit of 75`, 'warning');
      flag(v > 3.5 && v <= 4, `Vibration ${v} exceeds warning limit of 3.5`, 'warning');
    }

    if (type === 'road') {
      const d = parseInt(values.defect_count) || 0;
      const cond = values.condition || 'Good';
      flag(d >= 4 || cond === 'Bad',       `Defect count ${d} — critical limit is 4`, 'critical');
      flag(d >= 2 && d < 4 || cond === 'Moderate', `Defect count ${d} — warning limit is 2`, 'warning');
    }

    if (reasons.length === 0) reasons.push('All readings within normal range.');
    return { status, reasons };
  }

  function analyze() {
    if (!currentType) return;

    // Collect sensor values
    const values = {};
    FIELDS[currentType].forEach(f => {
      const el = document.getElementById(`f-${f.id}`);
      if (el) values[f.id] = el.value;
    });

    const name = document.getElementById('f-name').value.trim() || `New ${currentType}`;
    const lat  = parseFloat(document.getElementById('f-lat').value) || 13.0827;
    const lng  = parseFloat(document.getElementById('f-lng').value) || 80.2101;

    const { status, reasons } = classify(currentType, values);
    const s = status.toLowerCase();

    // Result header
    const icons = { Healthy: '✅', Warning: '⚠️', Critical: '🚨' };
    document.getElementById('result-icon').textContent = icons[status];
    document.getElementById('result-status').textContent = `${name} — ${status}`;
    document.getElementById('result-reason').textContent = reasons.join(' · ');

    const header = document.getElementById('result-header');
    header.className = `result-header status-${s}`;

    // Map
    if (resultMap) { resultMap.remove(); resultMap = null; }
    resultMap = L.map('result-map').setView([lat, lng], 15);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri' }).addTo(resultMap);

    const mc = { healthy: '#4f46e5', warning: '#b7791f', critical: '#c0392b' }[s];
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:18px;height:18px;border-radius:50%;background:${mc};border:3px solid white;box-shadow:0 0 12px ${mc}88;"></div>`,
      iconSize: [18,18], iconAnchor: [9,9]
    });
    L.marker([lat, lng], { icon }).addTo(resultMap).bindPopup(`<b>${name}</b><br>${status}`).openPopup();
    L.circle([lat, lng], { radius: 120, color: mc, fillColor: mc, fillOpacity: 0.1, weight: 1 }).addTo(resultMap);

    // Chart
    if (resultChart) { resultChart.destroy(); resultChart = null; }
    const chartLabels = [], chartVals = [], chartColors = [];
    const colorMap = { healthy: '#4f46e5', warning: '#b7791f', critical: '#c0392b' };

    FIELDS[currentType].forEach(f => {
      if (f.type === 'select') return;
      const v = parseFloat(values[f.id]);
      if (isNaN(v)) return;
      chartLabels.push(f.label);
      chartVals.push(v);
      let c = colorMap.healthy;
      if (f.crit && v >= f.crit) c = colorMap.critical;
      else if (f.warn && v >= f.warn) c = colorMap.warning;
      chartColors.push(c);
    });

    if (chartLabels.length) {
      resultChart = new Chart(document.getElementById('result-chart'), {
        type: 'doughnut',
        data: {
          labels: chartLabels,
          datasets: [{ data: chartVals.map(() => 1), backgroundColor: chartColors, borderWidth: 2, borderColor: '#fff' }]
        },
        options: {
          plugins: {
            legend: { position: 'right', labels: { font: { family: 'DM Mono', size: 10 }, color: '#8880a8', boxWidth: 10, padding: 8 } },
            tooltip: { callbacks: { label: (ctx) => ` ${chartLabels[ctx.dataIndex]}: ${chartVals[ctx.dataIndex]}` } }
          },
          cutout: '55%'
        }
      });
    }

    // Reading breakdown
    const readingsEl = document.getElementById('result-readings');
    readingsEl.innerHTML = '';
    FIELDS[currentType].forEach(f => {
      const v = values[f.id];
      if (!v && v !== '0') return;
      const num = parseFloat(v);
      let cls = 'r-ok';
      if (!isNaN(num)) {
        if (f.crit && num >= f.crit) cls = 'r-crit';
        else if (f.warn && num >= f.warn) cls = 'r-warn';
      }
      const display = f.unit ? `${v} ${f.unit}` : v;
      readingsEl.innerHTML += `
        <div class="reading-row">
          <span class="r-key">${f.label}</span>
          <span class="r-val ${cls}">${display}</span>
        </div>`;
    });

    // Show result + save button for admin
    document.getElementById('result-section').classList.add('visible');
    if (role === 'admin') {
      document.getElementById('save-row').classList.add('visible');
      document.getElementById('save-confirm').style.display = 'none';
    }

    // Scroll to result
    document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  async function saveAsset() {
    const values = {};
    FIELDS[currentType].forEach(f => {
      const el = document.getElementById(`f-${f.id}`);
      if (el) values[f.id] = el.value || null;
    });

    const name = document.getElementById('f-name').value.trim() || `New ${currentType}`;
    const lat  = parseFloat(document.getElementById('f-lat').value) || 13.0827;
    const lng  = parseFloat(document.getElementById('f-lng').value) || 80.2101;
    const { status, reasons } = classify(currentType, values);

    const asset = { name, type: currentType, lat, lng, health_status: status, reason: reasons.join(', '), ...values };

    try {
      await fetch(`${API}/assets/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(asset)
      });
    } catch(e) {}

    document.querySelector('.save-btn').style.display = 'none';
    document.getElementById('save-confirm').style.display = 'block';
  }
</script>
</body>
</html>
