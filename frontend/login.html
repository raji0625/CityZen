<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityZen — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --surface2: #191d26;
    --border: #232732;
    --text: #e8eaf0;
    --muted: #505670;
    --accent: #22d3c8;
    --green: #22d3c8;
    --red: #f05252;
    --yellow: #f0a030;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #232732 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; }

  .container {
    width: 100%;
    max-width: 380px;
    padding: 0 24px;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  h1 {
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .tab {
    flex: 1;
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface2);
    border: none;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .tab.active {
    background: var(--accent);
    color: #0d0f14;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  input {
    width: 100%;
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--accent); }

  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
    font-family: 'DM Mono', monospace;
  }

  .btn {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.88; }

  .error {
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
    display: none;
    font-family: 'DM Mono', monospace;
  }

  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">CityZen</div>

  <h1>Infrastructure Monitor</h1>
  <p class="subtitle">Urban asset health & anomaly analysis</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('public', this)">Public</button>
    <button class="tab" onclick="switchTab('admin', this)">Admin</button>
  </div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" />
    <div class="hint" id="user-hint">public</div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />
    <div class="hint" id="pass-hint">public123</div>
  </div>

  <button class="btn" onclick="doLogin()">Sign in</button>
  <div class="error" id="error">Incorrect username or password</div>

  <div class="footer">Chennai Urban Infrastructure · 55 assets monitored</div>
</div>

<script>
  let role = 'public';

  const creds = {
    public: { user: 'public', pass: 'public123' },
    admin:  { user: 'admin',  pass: 'admin123'  }
  };

  function switchTab(r, btn) {
    role = r;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('user-hint').textContent = creds[r].user;
    document.getElementById('pass-hint').textContent = creds[r].pass;
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('error').style.display = 'none';
  }

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const c = creds[role];
    if (u === c.user && p === c.pass) {
      sessionStorage.setItem('role', role);
      window.location.href = 'index.html';
    } else {
      document.getElementById('error').style.display = 'block';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
